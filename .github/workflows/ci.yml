name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-ai/crm/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: lead-ai/crm/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          DATABASE_URL: "sqlite:///./test_crm.db"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: lead-ai/crm/backend/test-results.xml

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-ai/crm/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: lead-ai/crm/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false  # Prevent treating warnings as errors

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            --target backend \
            -t crm-backend:${{ github.sha }} \
            lead-ai/crm/

      - name: Build frontend image
        run: |
          docker build \
            --target frontend \
            -t crm-frontend:${{ github.sha }} \
            lead-ai/crm/
